    <title>Divya Desam Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html { scroll-behavior: smooth; }
        .spinner {
            border: 3px solid rgba(251, 191, 36, 0.3);
            border-radius: 50%;
            border-top: 3px solid #d97706;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-amber-50 text-gray-800 font-sans min-h-screen pb-12">

    <div class="max-w-3xl mx-auto p-4 sm:p-6 lg:p-8">
        <!-- Header -->
        <header class="text-center mb-8 mt-4">
            <h1 class="text-3xl sm:text-4xl font-bold text-amber-800 mb-2 flex items-center justify-center gap-2">

                Divya Desam Finder
            </h1>
            <p class="text-amber-700 font-medium">Find sacred shrines near you (within 150km)</p>
        </header>

        <!-- Search Section -->
        <div class="bg-white rounded-2xl shadow-sm border border-amber-100 p-5 sm:p-6 mb-8">
            <div class="flex flex-col sm:flex-row gap-3">
                <input type="text" id="locationInput" placeholder="Enter your city (e.g., Madurai)" 
                    class="flex-1 px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-500 bg-gray-50 text-base"
                    onkeypress="if(event.key === 'Enter') handleSearch()">
                
                <button onclick="handleSearch()" id="searchBtn" 
                    class="bg-amber-600 text-white px-6 py-3 rounded-xl font-medium hover:bg-amber-700 transition shadow-sm flex justify-center items-center">
                    Search
                </button>
                
                <button onclick="getUserLocation()" id="locationBtn" 
                    class="bg-white text-gray-700 px-5 py-3 rounded-xl font-medium border border-gray-300 hover:bg-gray-50 transition flex items-center justify-center gap-2 shadow-sm whitespace-nowrap">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-amber-600"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
                    Use My Location
                </button>
            </div>
            
            <!-- Status & Loading -->
            <div id="statusContainer" class="mt-4 flex flex-col items-center justify-center hidden h-10">
                <div id="loadingSpinner" class="spinner hidden"></div>
                <p id="statusMessage" class="text-sm font-medium mt-2 text-amber-700"></p>
            </div>
        </div>

        <!-- Results Section -->
        <div id="resultsHeader" class="hidden mb-4 flex justify-between items-end">
            <h2 class="text-xl font-bold text-gray-800" id="resultsTitle">Nearby Temples</h2>
            <span class="text-sm text-gray-500 font-medium bg-amber-100 px-3 py-1 rounded-full" id="resultsCount">0 found</span>
        </div>
        
        <div id="resultsContainer" class="space-y-4">
            <!-- Empty state -->
            <div class="text-center py-12 bg-white rounded-2xl border border-dashed border-gray-300">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mx-auto text-gray-400 mb-4"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>

            </div>
        </div>

        function showStatus(message, isLoading = false, isError = false) {
            const container = document.getElementById('statusContainer');
            const spinner = document.getElementById('loadingSpinner');
            const msgEl = document.getElementById('statusMessage');
            
            container.classList.remove('hidden');
            msgEl.textContent = message;
            
            if (isLoading) {
                spinner.classList.remove('hidden');
                msgEl.className = 'text-sm font-medium mt-2 text-amber-600';
            } else {
                spinner.classList.add('hidden');
                msgEl.className = `text-sm font-medium mt-2 ${isError ? 'text-red-600' : 'text-green-600'}`;
            }
        }

        function hideStatus() {
            document.getElementById('statusContainer').classList.add('hidden');
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = 
                Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2); 
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
            return R * c;
        }

        async function geocodeLocation(city) {
            // Nominatim (OpenStreetMap) — 100% free, no API key needed
            // Works on localhost and any hosted server (Vercel, Netlify, etc.)
            const url = 'https://nominatim.openstreetmap.org/search?q=' +
                encodeURIComponent(city) + '&format=json&limit=1&addressdetails=1';

            const response = await fetch(url, {
                headers: {
                    'Accept': 'application/json',
                    'Accept-Language': 'en'
                }
            });

            if (!response.ok) throw new Error('Network error: ' + response.status);

            const results = await response.json();

            if (!results || results.length === 0) {
                throw new Error('City not found. Please try a different city name.');
            }

            return {
                lat: parseFloat(results[0].lat),
                lng: parseFloat(results[0].lon)
            };
        }

        function getUserLocation() {
            if ("geolocation" in navigator) {
                showStatus("Retrieving your current location...", true);
                
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const { latitude, longitude } = position.coords;
                        showStatus("Location found!", false, false);
                        document.getElementById('locationInput').value = "My Current Location";
                        processAndDisplayTemples(latitude, longitude, "Your Location");
                        setTimeout(hideStatus, 2000);
                    },
                    (error) => {
                        let msg = "Could not determine your location. ";
                        switch(error.code) {
                            case error.PERMISSION_DENIED: msg = "Location permission denied. Please enter your city manually."; break;
                            case error.POSITION_UNAVAILABLE: msg += "Location information is unavailable."; break;
                            case error.TIMEOUT: msg += "The location request timed out."; break;
                            default: msg += "An unknown error occurred.";
                        }
                        showStatus(msg, false, true);
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            } else {
                showStatus("Geolocation is not supported by your browser.", false, true);
            }
        }

        async function handleSearch() {
            const input = document.getElementById('locationInput').value.trim();
            if (!input) {
                showStatus("Please enter a city name.", false, true);
                return;
            }

            if (input === "My Current Location") {
                getUserLocation();
                return;
            }

            showStatus(`Searching for "${input}"...`, true);

            try {
                const coords = await geocodeLocation(input);
                showStatus("Location found! Searching for temples...", true);
                processAndDisplayTemples(coords.lat, coords.lng, input);
                setTimeout(hideStatus, 2000);
            } catch (error) {
                console.error("Geocoding Error:", error);
                showStatus("Could not find the location. " + error.message, false, true);
            }
        }

        function processAndDisplayTemples(userLat, userLng, locationName) {
            const processedTemples = temples
                .filter(t => t.lat !== 0 && t.lng !== 0)
                .map(temple => {
                    const dist = calculateDistance(userLat, userLng, temple.lat, temple.lng);
                    return { ...temple, distance: dist };
                });

            const filteredTemples = processedTemples
                .filter(t => t.distance <= 150)
                .sort((a, b) => a.distance - b.distance);

            renderTemples(filteredTemples, locationName);
        }

        function renderTemples(results, locationName) {
            const container = document.getElementById('resultsContainer');
            const header = document.getElementById('resultsHeader');
            const countLabel = document.getElementById('resultsCount');
            const titleLabel = document.getElementById('resultsTitle');

            container.innerHTML = '';
            header.classList.remove('hidden');
            
            if (results.length === 0) {
                titleLabel.textContent = `Temples near ${locationName}`;
                countLabel.textContent = "0 found";
                countLabel.className = "text-sm text-amber-700 font-medium bg-amber-100 px-3 py-1 rounded-full";
                
                container.innerHTML = `
                    <div class="text-center py-10 bg-white rounded-2xl shadow-sm border border-amber-100">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="mx-auto text-amber-300 mb-4"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                        <h3 class="text-lg font-medium text-gray-800 mb-2">No Temples Found</h3>
                        <p class="text-gray-500 max-w-sm mx-auto">There are no Divya Desams within 150km of your location.</p>
                    </div>
                `;
                return;
            }

            titleLabel.textContent = `Temples near ${locationName}`;
            countLabel.textContent = `${results.length} found`;
            countLabel.className = "text-sm text-green-800 font-medium bg-green-100 border border-green-200 px-3 py-1 rounded-full";

            results.forEach(temple => {
                const mapLink = `https://www.google.com/maps/search/?api=1&query=${temple.lat},${temple.lng}`;
                const distanceStr = temple.distance.toFixed(1);

                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md hover:border-amber-200 transition duration-200 flex flex-col sm:flex-row gap-4 justify-between items-start";
                
                card.innerHTML = `
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="bg-amber-100 text-amber-800 text-xs px-2 py-0.5 rounded font-semibold tracking-wide uppercase">${temple.group}</span>
                            <span class="text-xs text-gray-400 font-medium">#${temple.id}</span>
                        </div>
                        <h3 class="text-xl font-bold text-gray-900 mb-1">${temple.name}</h3>
                        <div class="flex items-center text-sm text-gray-500 mb-3 gap-1">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                            ${temple.location}
                        </div>
                        <p class="text-gray-600 text-sm leading-relaxed mb-4 sm:mb-0">${temple.description}</p>
                    </div>
                    
                    <div class="flex flex-col items-start sm:items-end w-full sm:w-auto min-w-[120px] gap-3 bg-amber-50 sm:bg-transparent p-4 sm:p-0 rounded-xl">
                        <div class="text-left sm:text-right w-full">
                            <div class="text-2xl font-black text-amber-600">${distanceStr}</div>
                            <div class="text-xs font-semibold text-amber-800 uppercase tracking-wider">Kilometers</div>
                        </div>
                        <a href="${mapLink}" target="_blank" rel="noopener noreferrer" 
                           class="w-full sm:w-auto inline-flex items-center justify-center gap-2 bg-gray-900 hover:bg-gray-800 text-white text-sm font-medium py-2 px-4 rounded-lg transition">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
                            Get Directions
                        </a>
                    </div>
                `;
                container.appendChild(card);
            });
        }
    </script>
